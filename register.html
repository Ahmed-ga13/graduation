<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Spend - Register</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-analytics-compat.js"></script>
</head>
<body>

    <div class="auth-container">

        <!-- Left Panel: Illustration -->
        <div class="auth-left">
            <img src="assets/image 2 (1).png" alt="Smart Spend Illustration">
        </div>

        <!-- Right Panel: Form -->
        <div class="auth-right">
            <div class="auth-form-wrapper">

                <h1 class="auth-title">Create your Smart Spend account</h1>

                <form action="#">

                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon-left"><i data-lucide="user"></i></span>
                            <input type="text" id="regName" class="form-control" placeholder="Alex Johnson">
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <div class="input-wrapper">
                            <span class="input-icon-left"><i data-lucide="mail"></i></span>
                            <input type="email" id="regEmail" class="form-control" placeholder="alex.johnson@fintech.com">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon-left"><i data-lucide="lock"></i></span>
                            <input type="password" id="regPassword" class="form-control has-right-icon" placeholder="Create a password">
                            <span class="input-icon-right"><i data-lucide="eye"></i></span>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon-left"><i data-lucide="lock"></i></span>
                            <input type="password" id="regConfirmPassword" class="form-control has-right-icon" placeholder="Confirm your password">
                            <span class="input-icon-right"><i data-lucide="eye"></i></span>
                        </div>
                    </div>

                    <button type="button" id="registerBtn" class="btn btn-primary">Create an account</button>

                    <div class="divider"><span>OR</span></div>

                    <button type="button" id="googleRegisterBtn" class="btn btn-google">
                        <svg width="18" height="18" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                        </svg>
                        Continue with Google
                    </button>

                    <div class="auth-switch">
                        Already have an account? <a href="login.html">Login</a>
                    </div>

                    <div class="security-text">
                        <i data-lucide="lock"></i>
                        Your data is encrypted and never shared without your consent.
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
