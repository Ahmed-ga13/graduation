<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Spend - Expense List</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/expense-list.css">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-analytics-compat.js"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <img src="assets/Group.png" alt="Smart Spend Logo">
            <span>SMART SPEND</span>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle navigation">
            <i data-lucide="menu"></i>
        </button>
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="reports.html">Reports</a>
            <a href="expense-list.html" class="active">Expense List</a>
            <a href="account.html">Account</a>
        </div>
        <div class="nav-actions">
            <a href="login.html"><button class="btn-login">Log In</button></a>
            <a href="register.html"><button class="btn-register">Register</button></a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="dashboard-main">

        <!-- Page Header -->
        <div class="expense-list-header">
            <h1 class="page-title">Expense List</h1>
            <div class="badge-count" id="expense-count-badge">0 Expenses</div>
        </div>

        <!-- Search & Sort -->
        <div class="search-filter-row">
            <div class="search-wrapper">
                <i data-lucide="search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search by category or amount">
            </div>
            <div class="sort-dropdown-wrapper">
                <select class="btn-sort" id="sortSelect">
                    <option value="date" selected>Sort by Date</option>
                    <option value="amount">Sort by Amount</option>
                </select>
                <i data-lucide="chevron-down" class="sort-icon"></i>
            </div>
        </div>

        <!-- Expense Table -->
        <div class="expense-table-card">
            <table class="expense-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Payment</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="expense-tbody">
                    <!-- Populated by expense-list.js -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination-container">
            <!-- Populated by expense-list.js -->
        </div>

    </main>

    <!-- Modal: Delete -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-card">
            <div class="modal-icon red"><i data-lucide="trash-2"></i></div>
            <div class="modal-title">Delete Transaction</div>
            <div class="modal-text">Are you sure you want to delete this transaction? This action cannot be undone.</div>
            <div class="modal-actions">
                <button class="btn-modal btn-modal-cancel" id="btnCancelDelete">Cancel</button>
                <button class="btn-modal btn-modal-delete" id="btnConfirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <!-- Modal: Edit -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-card">
            <div class="modal-icon green"><i data-lucide="pencil"></i></div>
            <div class="modal-title">Edit Amount</div>
            <div class="modal-text">Enter the new amount for this transaction.</div>
            <input type="number" class="modal-input" id="editAmountInput" placeholder="0.00" step="0.01">
            <div class="modal-actions">
                <button class="btn-modal btn-modal-cancel" id="btnCancelEdit">Cancel</button>
                <button class="btn-modal btn-modal-save" id="btnConfirmEdit">Save</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/expense-list.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
